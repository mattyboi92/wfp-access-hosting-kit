<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');</style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#F6821F"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1400" height="900" fill="#FFFFFF"/>
  <text x="40" y="56" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="700" fill="#1A1A1A">Self-service publish flow — describe it, ship it</text>
  <text x="40" y="86" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#6B7280">A non-engineer describes a site; the agent builds it and publishes it through Access + Workers for Platforms. No Cloudflare credential ever on the device.</text>
<rect x="590" y="300" width="700" height="300" rx="8" fill="none" stroke="#1A6FD4" stroke-width="1.5" stroke-dasharray="8 4"/><text x="606" y="326" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="600" letter-spacing="0.5" fill="#1A6FD4">CLOUDFLARE — YOUR ACCOUNT (USER NEVER HOLDS A CF CREDENTIAL)</text><rect x="86" y="378" width="128" height="104" rx="10" fill="#F5F7FA" stroke="#D1D9E0" stroke-width="1.5"/><g stroke="#1A6FD4" stroke-width="2.2" fill="none" stroke-linejoin="round" stroke-linecap="round" transform="translate(150,422)"><circle cx="0" cy="-12" r="11"/><path d="M-20 26 C-20 6 20 6 20 26"/></g><text x="150" y="470" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#1A1A1A">Non-engineer</text><text x="150" y="508" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12.5" font-weight="400" fill="#6B7280">+ AI agent (opencode)</text><rect x="346" y="378" width="128" height="104" rx="10" fill="#F5F7FA" stroke="#D1D9E0" stroke-width="1.5"/><g stroke="#1A6FD4" stroke-width="2.2" fill="none" stroke-linejoin="round" stroke-linecap="round" transform="translate(410,422)"><path d="M-18 -26 H10 L22 -14 V26 H-18 Z"/><path d="M10 -26 V-14 H22"/><line x1="-10" y1="-2" x2="14" y2="-2"/><line x1="-10" y1="8" x2="14" y2="8"/><line x1="-10" y1="18" x2="6" y2="18"/></g><text x="410" y="470" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#1A1A1A">publish-site.sh</text><text x="410" y="508" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12.5" font-weight="400" fill="#6B7280">auto cloudflared login</text><rect x="606" y="378" width="128" height="104" rx="10" fill="#F5F7FA" stroke="#D1D9E0" stroke-width="1.5"/><g stroke="#1A6FD4" stroke-width="2.2" fill="none" stroke-linejoin="round" stroke-linecap="round" transform="translate(670,422)"><path d="M0 -28 L24 -18 V2 C24 18 12 26 0 30 C-12 26 -24 18 -24 2 V-18 Z"/><path d="M-10 0 L-2 9 L12 -10"/></g><text x="670" y="470" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#1A1A1A">Cloudflare Access</text><text x="670" y="508" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12.5" font-weight="400" fill="#6B7280">SSO -&gt; signed JWT</text><rect x="866" y="378" width="128" height="104" rx="10" fill="#F5F7FA" stroke="#D1D9E0" stroke-width="1.5"/><g stroke="#1A6FD4" stroke-width="2.2" fill="none" stroke-linejoin="round" stroke-linecap="round" transform="translate(930,422)"><path d="M0 -28 L24 -14 L24 14 L0 28 L-24 14 L-24 -14 Z"/></g><text x="930" y="470" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#1A1A1A">Control-plane</text><text x="930" y="508" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12.5" font-weight="400" fill="#6B7280">validate JWT -&gt; deploy</text><rect x="1146" y="378" width="128" height="104" rx="10" fill="#F5F7FA" stroke="#D1D9E0" stroke-width="1.5"/><g stroke="#1A6FD4" stroke-width="2.2" fill="none" stroke-linejoin="round" stroke-linecap="round" transform="translate(1210,422)"><path d="M0 -28 L24 -14 L24 14 L0 28 L-24 14 L-24 -14 Z"/></g><text x="1210" y="470" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#1A1A1A">Tenant Worker</text><text x="1210" y="508" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12.5" font-weight="400" fill="#6B7280">isolated -&gt; owner-&lt;email&gt;</text><polyline points="214,430 346,430" fill="none" stroke="#F6821F" stroke-width="2" marker-end="url(#arrow)"/><rect x="203.6" y="404.0" width="152.8" height="20" rx="4" fill="#FFFFFF" opacity="0.92"/><text x="280.0" y="418.0" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12.5" font-weight="500" fill="#6B7280">1. describe -&gt; HTML</text><polyline points="474,430 606,430" fill="none" stroke="#F6821F" stroke-width="2" marker-end="url(#arrow)"/><rect x="467.2" y="404.0" width="145.6" height="20" rx="4" fill="#FFFFFF" opacity="0.92"/><text x="540.0" y="418.0" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12.5" font-weight="500" fill="#6B7280">2. cf-access-token</text><polyline points="734,430 866,430" fill="none" stroke="#F6821F" stroke-width="2" marker-end="url(#arrow)"/><rect x="741.6" y="404.0" width="116.8" height="20" rx="4" fill="#FFFFFF" opacity="0.92"/><text x="800.0" y="418.0" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12.5" font-weight="500" fill="#6B7280">3. injects JWT</text><polyline points="994,430 1146,430" fill="none" stroke="#F6821F" stroke-width="2" marker-end="url(#arrow)"/><rect x="1026.0" y="404.0" width="88.0" height="20" rx="4" fill="#FFFFFF" opacity="0.92"/><text x="1070.0" y="418.0" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12.5" font-weight="500" fill="#6B7280">4. WFP API</text><rect x="1146" y="588" width="128" height="104" rx="10" fill="#F5F7FA" stroke="#D1D9E0" stroke-width="1.5"/><g stroke="#1A6FD4" stroke-width="2.2" fill="none" stroke-linejoin="round" stroke-linecap="round" transform="translate(1210,632)"><circle cx="0" cy="0" r="27"/><ellipse cx="0" cy="0" rx="11" ry="27"/><line x1="-27" y1="0" x2="27" y2="0"/><line x1="-23" y1="-14" x2="23" y2="-14"/><line x1="-23" y1="14" x2="23" y2="14"/></g><text x="1210" y="680" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#1A1A1A">&lt;slug&gt;.sites.example.com</text><text x="1210" y="718" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12.5" font-weight="400" fill="#6B7280">behind Access</text><polyline points="1210,482 1210,588" fill="none" stroke="#F6821F" stroke-width="2" marker-end="url(#arrow)"/><rect x="1176.8" y="519.0" width="66.4" height="20" rx="4" fill="#FFFFFF" opacity="0.92"/><text x="1210.0" y="533.0" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12.5" font-weight="500" fill="#6B7280">Live at</text><rect x="590" y="620" width="700" height="34" rx="6" fill="#F6821F" opacity="0.08"/><text x="606" y="642" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12.5" fill="#6B7280">Scoped CF API token lives only in the control-plane as a Worker Secret — it never leaves the platform.</text></svg>
